body:
  text: 朝議大夫兼侍御史武徹述佛頂尊勝陀羅尼者一切如來祕密之藏總持法門大日如來智印吉祥善淨破一切惡道大神力陀羅尼也昔儀鳳年中佛陀波利所傳之本遍天下幡剎持誦有多矣徹自弱歲則常念持永泰初自喪妻之後倍益精心求出離法時有殿中侍御史蔣那者常持誦此陀羅尼異日於私室條然而來曰今得究竟道非常難遇徹敬問之即尊勝陀羅尼也命之令誦而文句全廣音旨頗異拜而誦之乃曰受之於王開士開士受之於金剛智三藏大師云西國亦希有此本吾將梵本來故密授焉坐中歎奇絶之事而罷未獲求本俄而將刑歿世常懷遺悔追悔不及每遇精士即求問之冀其萬一遂遇僧際公果有此本文開元中五臺山下有一精修居士姓王有事遠出行去後父亡回來不見至心誦尊勝陀羅尼數十萬遍願知見先考所受生善惡業報精誠懇願殊無覺知遂欲出山見一老人謂居士曰仁者念持實為勤敏然文句多脫略我今授示全本文句居士拜而而受之乃云可誦千遍殆然經數日於夜中忽聞環珮簫管之聲降自庭宇此時居士驚起視之見天人數十輩共圍繞一天仙前謂之曰汝識吾否居士答曰不知天仙曰我是汝父比年誦持尊勝陀羅尼吾得爾之福力然後數月已來福倍於積歲不知汝更得何本以至於斯吾今以汝之力故獲為天仙之王則知汝所持念功效不可量也言訖上升居士歡躍拜送自爾尤加精進後日至東京有一專修學人王少府者亦波利尊勝之本誦持積數數萬忽於夜中夢見一梵僧來謂小府曰賢者念誦殊謂精誠所歎本誤文少而功薄也王少府稽首懇請真文梵僧乃授之以廣本文句句口授訖送僧出門光景如晝回至床前視室中僮僕猶臥忽覺呼而責之以明矣僮僕云今才夜半忽然光滅及夕王少府自異所見閉目誦之歷歷清暢轉益精勤天寶初五臺山人王居士及王少府咸在東都俱不相識忽然王少府暴亡經七日而蘇城中好事者盡問其故居士乃王開士亦同詣問得再生之由王少府云吾初臥忽見二使來云追逐相隨行數十里至一大樹下二使者憩吾亦憩之忽憶尊勝遂即閉目誦三七遍舉目回視二使者已不知所之須臾四人又至跪而言曰仁者奚為修行有此利益向來追者二使並得生天王少府曰吾但誦尊勝陀羅尼四人曰唯此功力之故也請與弟子誦之救拔苦難王少府又冥目誦三七遍開目又不見四人矣頃刻之際空中聞戈甲聲有一神人紫服被戈甲儀衛侍從甚盛前跪而言曰吾是五道冥司頗稱貴位然終為神道所攝願得生天彼六人者以師法力之故各得生天今請迃于音曲步至弟子所居誦之冀霑福蔭之餘也乃相隨至一陂宅方圓數十里皆是罪人枷鎖杻械囚縛決罰訊問栲椋之所神令王少府上高座自於床下跪而聽之王少府閉目志之誦滿四十九遍舉目四顧一人不見唯有斷鎖破杻弊械空枷而已王少府驚悚囚知所適忽然有四五人至云王命速發遣回亂我曹扄文簿破我冥司遂驅逐王少府令入一空谷中便蘇息再得生耳實尊勝陀羅尼不思議之功力也於是五臺王山人及王開士與王少府既同業因各陳其所持本勘校文句多少並同如一本焉彼此相慶賀王山人曰吾本受之於臺山聖公王少府曰吾本受之於神僧王開士曰吾本受之於金剛智三藏梵夾見存三人懼然共勘其本音旨字數如一故知衆生聞法有時流傳教法亦有時歎真實世間希有此即是金剛智三藏梵本譯出者令勘佛陀波所利傳本文句大同多於舊本九句六十九字餘悉波利僧惠琳因修大藏目録收未入藏經六百餘卷并遂略武徹所敘陀羅尼感應神驗親自勘同序之卷末時元和十四年己丑歲前朝蔣大夫行通事舍人張承福及百濟僧各受持尊勝陀羅尼有功曾為冥司所追以真言威力不可思議遂不受諸苦兼濟拔受苦群生有傳記琳於成都府右經藏中得之時如意二年三月二十三日佛頂尊勝陀羅尼感應事開元二十六年冬有神都張繹長史自小孝養父母父母歿後沈淪惡道乃虔心報恩每懷濟度遂即入山持尊勝陀羅尼志願見亡父母得安樂處日夜勤誦聲聲不絶朝暮懇誠六年念之念中不曾見父母疑呪無驗欲生退心忽見一老翁儀容甚異語云非是呪無靈驗亦非君不盡心斯乃去聖時遙翻譯多誤呪詞脫略遂失其徵老人即口授令抄録一本依此文句持誦期滿七日必當見父即依老人口訣至心禮拜舉頭失老人不知所在方賢聖耶情乃驚愕倍更虔誠具依所教文本專心誦持始登六日即亡父母遂來恩愛未絶拘頭悲喜幽明感會情各愴然口云墮大地獄中備遭諸苦年月已深乘兒精誠功力近得生天今從上界下來與汝相見威光稍別示相由存具述因緣宛如平昔凡是人孝之子覩此感應豈不留心聖教耶但虛腸畐心縱恣六情追歡遊樂有何益焉況目連釋子救母之事具在聖文長史至誠有此感效也後有僧傳得誦念舍利境界極多來至東都具戴靈事頗為為人所知後有好事者請各流傳即釋門弟子也長慶三年四月中旬前奉天縣尉馬揚秋滿移歸𮑱坂住東城石子坊舊第持波利尊勝之本一十五年未嘗墮慢及到𮑱坂經數月忽然夢見一神人被甲狀貌甚異云汝既精心持此真言何不詣景福寺東廊坊一持念僧有尊勝靈驗本持之功九倍常言訖驚覺汗流透衣明日便專詣寺尋僧數日方遇僧法名義𮐕既見問之此僧果久精心此門遠近依止僧問曰有何事相覓坐訖乃話所夢之事𮐕曰大奇大奇畜此本來無人知解少公今日蒙神人指示𮐕焉敢吝惜乃命弟子出篋取至真實教傳受將歸勘舊所持波利本方知文句脫略便依法修行新本其神驗頗異兼更傳尊勝瑜伽兩卷乃知聖教分明作有法度不可任其凡智也因録記之傳同志者佛頂尊勝陀羅尼曩謨引婆誐嚩無可反下同帝引一句怛𡃤二引轉合古路引枳也二合鉢羅二合底丁以反尾始瑟吒二合引野三沒馱引野婆去誐嚩帝引四怛儞也二合他去引五唵引尾戍引馱野尾戍馱野六娑麼娑麼三去滿多去嚩婆去引娑七娑頗二合羅拏鼻音誐底誐賀曩八沙嚩二合婆去引嚩尾秫請律反第九阿上鼻詵正謹反左一本六者覩𤚥莫敢反引素誐多十嚩囉嚩左隹上曩引十一阿蜜㗚二合轉舌多去引鼻曬所戒反引罽居又反引十二阿去引賀囉十三阿去引庾羊主反散馱引羅抳尼敕止反十四戍引馱野戍引馱野十五誐誐曩尾秫弟十六塢瑟抳二合引灑尾惹自攞反野尾秫弟十七娑賀娑羅二合羅羅字聲轉舌濕茗二合散祖一本云注儞左以反下同帝十八薩嚩怛他去引誐多十九嚩盧羯儞寧碩反二十娑吒波二合囉蜜多引二十一波唎布引囉抳二十二薩婆怛他𮓌多纈哩二合馱野引二十三地瑟吒二合引曩二十四地瑟恥二合多二十五摩賀引母𭝎𭋸二合轉舌引二十六嚩日囉二合迦引野二十七僧賀多曩尾秫第二十八薩嚩引嚩囉拏鼻引二十九波耶突㗚二合揭底跛唎秫弟三十鉢囉二合底𩕳𮧬脫發反轉舌阿多野去引欲秫弟三十一三去麼野引地瑟恥二合帝三十二麼𩕳摩賀麼𩕳三十三怛闥多去引部引多三十四句引知跛哩秫弟三十五尾娑普二合吒沒池秫弟三十六惹野尾惹野尾惹野二合三十娑麼二合囉娑麼二合囉三十九薩嚩沒馱引地瑟恥二合多秫弟四十嚩曰𭋸二合嚩日囉二合𮓌陛引四十一嚩曰覽二合引婆去引嚩覩麼麼自稱名姓姓名若緣諸事誦亦稱亦稱之事舍唎嚂嚩薩埵南四十三者迦耶跛唎秫第四十四薩嚩誐底跛哩秫第四十五薩嚩怛他去引𮓌多去引室者銘四十六三去麼引濕嚩二合娑演覩四十七薩嚩怛他去引𮓌多四十八三去麼鼻引濕嚩二合引娑引地瑟恥二合帝四十九沒地野二合五十尾引馱野尾引馱野五十一三滿多跛哩秫弟五十二薩嚩怛他去引𮓌多纈哩二合馱野引五十三地瑟姹二合引曩引地瑟恥二合多摩賀引母捺𭋸二合轉舌引薩嚩二賀引佛頂尊勝陀羅尼加字具足本曩謨引婆去引誐嚩帝引怛𡃤二合引枳也二合鉢羅二合底尾始瑟吒二合野沒馱引野婆去誐嚩帝引怛儞也二合他引唵尾戍引馱野尾戍引馱野娑上麼鼻娑麼三去滿跢去引嚩婆去引娑娑頗二合囉拏鼻誐底誐賀曩娑嚩二合婆去引嚩尾秫第阿上鼻詵左都𤚥素誐跢嚩囉嚩左曩引阿蜜㗚二合哆鼻曬引罽引摩賀引曼怛囉二合跛乃引阿去引賀囉阿去引賀囉阿去引庾散馱引囉抳戍引馱野戍引馱野誐誐曩尾秫第塢瑟抳二合灑尾惹野尾秫第娑賀娑囉二合囉濕茗二合散祖儞帝薩囉嚩二合怛他去引誐跢嚩路引迦𩕳沙上吒播二合引囉弭哆去引跛哩布引囉抳薩囉嚩二合怛他去引誐哆紇哩二合娜野引地瑟姹二合曩引地瑟恥二合多摩賀引母捺哩二合引嚩日囉二合迦引野僧賀多上曩尾秫弟薩囉嚩二合引嚩囉拏鼻引播野訥𮓌底跛哩尾秫弟鉢囉二合底去引𩕳𮧬囉跢二合野阿欲秫第三去麼野引地瑟恥二合帝麼抳麼抳摩賀麼抳怛闥哆去引部多句引致跛哩秫弟尾娑普二合吒沒地秫弟惹野惹野尾惹野尾惹野娑麼二合囉娑麼二合去囉薩囉嚩二合沒馱引地瑟恥二合多秫弟嚩曰哩二合引嚩日囉二合引𮓌陛嚩曰囕二合引婆去引嚩覩麼麼稱名設哩嚂薩囉嚩二合薩怛嚩二合引難上引左迦引野跛哩尾秫第薩囉嚩二合誐底跛哩秫弟薩囉嚩二合怛他𮓌多去引室者二合銘三去麼引濕嚩二合引娑琰覩薩囉嚩二合怛他去引𮓌多三去麼鼻引濕嚩二合娑去引地瑟恥二合帝沒地野二合沒地野二合尾沒地野二合尾沒地野二合馱野馱野尾馱野尾馱野三去滿跢跛哩秫第薩囉嚩二合怛他去引𮓌哆紇哩二合娜野引地瑟姹二合曩地瑟恥二合多摩賀引母捺哩二合娑嚩二合賀此陀羅尼本中天竺三藏善無畏將傳此土凡漠地佛陀波利來流傳佛諸本並闕山是故具本譯出流行
